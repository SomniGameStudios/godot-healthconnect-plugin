name: Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot version (e.g. 4.6.2)'
        required: false
        default: '4.6.2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build plugin
        working-directory: platforms/android
        run: ./gradlew assemble

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthConnectPlugin
          path: platforms/godot_editor/addons/healthconnect_plugin/bin/
